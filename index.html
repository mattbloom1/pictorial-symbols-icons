const TOTAL = ITEMS.length;
const grid = document.getElementById('grid');
const empty = document.getElementById('empty');
const search = document.getElementById('search');
const category = document.getElementById('category');
const sort = document.getElementById('sort');
const count = document.getElementById('count');
const randomBtn = document.getElementById('randomBtn');
const starredFilterBtn = document.getElementById('starredFilterBtn');

const cats = [...new Set(ITEMS.map(i => i.category))].sort();
for (const c of cats) {
  const opt = document.createElement('option');
  opt.value = c; opt.textContent = c;
  category.appendChild(opt);
}

// Starred icons: in-memory only for this page view, intentionally NOT persisted
// (no localStorage) — resets on reload, which is what was asked for.
const starred = new Set();
let starredOnly = false;
let visibleItems = [];

function render() {
  const q = search.value.trim().toLowerCase();
  const cat = category.value;
  const filtered = ITEMS.filter(i =>
    (!q || i.name.includes(q)) && (!cat || i.category === cat) && (!starredOnly || starred.has(i.file))
  );
  const sortMode = sort.value;
  filtered.sort((a, b) => {
    if (sortMode === 'name-desc') return b.name.localeCompare(a.name);
    if (sortMode === 'category') return a.category.localeCompare(b.category) || a.name.localeCompare(b.name);
    return a.name.localeCompare(b.name);
  });
  visibleItems = filtered;
  grid.innerHTML = '';
  const frag = document.createDocumentFragment();
  for (const i of filtered) {
    const card = document.createElement('div');
    card.className = 'card' + (starred.has(i.file) ? ' starred' : '');
    card.dataset.file = i.file;
    card.innerHTML = `<span class="star-badge">&#9733;</span>` +
      `<div class="thumb"><img src="${i.file}" loading="lazy" alt="${i.name}"></div>` +
      `<div class="label${i.guess ? ' guess' : ''}">${i.name}${i.guess ? ' *' : ''}</div>`;
    card.addEventListener('click', () => openLightbox(i));
    frag.appendChild(card);
  }
  grid.appendChild(frag);
  empty.style.display = filtered.length ? 'none' : 'block';
  count.textContent = `${filtered.length} / ${TOTAL} icons`;
}

// --- lightbox: click a card to preview, download the SVG, or star it for this visit ---
const overlay = document.getElementById('lightbox-overlay');
const lbImg = document.getElementById('lb-img');
const lbName = document.getElementById('lb-name');
const lbMeta = document.getElementById('lb-meta');
const lbDownload = document.getElementById('lb-download');
const lbStar = document.getElementById('lb-star');
let current = null;

function openLightbox(item) {
  current = item;
  lbImg.src = item.file;
  lbImg.alt = item.name;
  lbName.textContent = item.name;
  lbMeta.textContent = item.category + (item.guess ? ' · best-guess name' : '');
  updateStarButton();
  overlay.hidden = false;
}

function closeLightbox() {
  overlay.hidden = true;
  current = null;
}

function updateStarButton() {
  if (!current) return;
  const isStarred = starred.has(current.file);
  lbStar.classList.toggle('starred', isStarred);
  lbStar.innerHTML = isStarred ? '&#9733; Starred' : '&#9733; Star';
}

lbDownload.addEventListener('click', () => {
  if (!current) return;
  const a = document.createElement('a');
  a.href = current.file;
  a.download = current.file;
  document.body.appendChild(a);
  a.click();
  a.remove();
});

lbStar.addEventListener('click', () => {
  if (!current) return;
  if (starred.has(current.file)) starred.delete(current.file);
  else starred.add(current.file);
  updateStarButton();
  if (starredOnly) {
    render();
  } else {
    const card = grid.querySelector(`.card[data-file="${CSS.escape(current.file)}"]`);
    if (card) card.classList.toggle('starred', starred.has(current.file));
  }
});

document.getElementById('lb-close').addEventListener('click', closeLightbox);
overlay.addEventListener('click', (e) => { if (e.target === overlay) closeLightbox(); });
document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && !overlay.hidden) closeLightbox(); });

search.addEventListener('input', render);
category.addEventListener('change', render);
sort.addEventListener('change', render);

starredFilterBtn.addEventListener('click', () => {
  starredOnly = !starredOnly;
  starredFilterBtn.classList.toggle('active', starredOnly);
  render();
});

randomBtn.addEventListener('click', () => {
  if (!visibleItems.length) return;
  openLightbox(visibleItems[Math.floor(Math.random() * visibleItems.length)]);
});

render();
</script>
