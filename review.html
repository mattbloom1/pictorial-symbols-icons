<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page-by-Page Review — Pictorial Symbols Library</title>
<style>
  :root { color-scheme: light; }
  body { font-family: -apple-system, Segoe UI, Arial, sans-serif; margin: 0; background: #f6f6f7; color: #1b1b1f; }
  header { position: sticky; top: 0; background: #fff; border-bottom: 1px solid #ddd; padding: 12px 20px; z-index: 20; }
  h1 { font-size: 17px; margin: 0 0 10px; }
  .toprow { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .navgroup { display: flex; gap: 6px; align-items: center; }
  button { font-size: 13px; padding: 8px 12px; border-radius: 6px; border: 1px solid #ccc; background: #fff; cursor: pointer; white-space: nowrap; }
  button:hover { background: #f3f3f4; }
  button.active { background: #1b1b1f; color: #fff; border-color: #1b1b1f; }
  button.good.active { background: #1a7f37; border-color: #1a7f37; }
  button.issues.active { background: #b15c00; border-color: #b15c00; }
  button.missing.active { background: #c02b2b; border-color: #c02b2b; }
  input[type=number] { width: 64px; padding: 8px 8px; font-size: 13px; border: 1px solid #ccc; border-radius: 6px; }
  #progress { font-size: 12.5px; color: #555; white-space: nowrap; }
  .spacer { flex: 1; }
  #pagemap { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 10px; max-height: 54px; overflow-y: auto; padding: 6px; background: #fafafa; border: 1px solid #eee; border-radius: 6px; }
  .dot { width: 20px; height: 20px; font-size: 9px; display: flex; align-items: center; justify-content: center;
    border-radius: 4px; background: #e4e4e6; color: #777; cursor: pointer; border: 1px solid transparent; }
  .dot:hover { border-color: #999; }
  .dot.current { border-color: #1b1b1f; border-width: 2px; }
  .dot.good { background: #d5edd8; color: #1a5c2a; }
  .dot.issues { background: #fbe3c4; color: #8a4a00; }
  .dot.missing { background: #f7d2d2; color: #8a1f1f; }
  .dot.empty::after { content: ''; position: absolute; }
  main { padding: 18px 20px 60px; max-width: 1100px; margin: 0 auto; }
  .page-head { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; margin-bottom: 10px; }
  .page-head h2 { font-size: 20px; margin: 0; }
  .page-head .sub { font-size: 13px; color: #666; }
  .autohint { font-size: 13px; color: #b02a2a; margin-bottom: 10px; }
  .statusrow { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  textarea { width: 100%; min-height: 70px; font-size: 14px; font-family: inherit; padding: 10px; border: 1px solid #ccc;
    border-radius: 8px; box-sizing: border-box; resize: vertical; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-top: 16px; }
  .card { background: #fff; border: 2px solid #e2e2e4; border-radius: 8px; padding: 10px; text-align: center; cursor: pointer; position: relative; }
  .card .thumb { width: 100%; height: 80px; display: flex; align-items: center; justify-content: center; }
  .card img { max-width: 100%; max-height: 80px; }
  .card .label { margin-top: 6px; font-size: 11px; word-break: break-word; color: #333; line-height: 1.3; }
  .card .guess { color: #b15c00; }
  .card .flagtag { position: absolute; top: 4px; right: 6px; font-size: 9px; font-weight: 700; padding: 1px 4px; border-radius: 3px; display: none; }
  .card.reject { border-color: #c02b2b; }
  .card.reject .flagtag { display: inline-block; background: #c02b2b; color: #fff; }
  .card.reject .label { text-decoration: line-through; color: #c02b2b; }
  .card.misnamed { border-color: #b15c00; }
  .card.misnamed .flagtag { display: inline-block; background: #b15c00; color: #fff; }
  .empty-state { padding: 30px; text-align: center; color: #888; background: #fff; border: 1px dashed #ccc; border-radius: 8px; margin-top: 10px; }
  .hint { font-size: 12px; color: #888; margin-top: 4px; }
  #importInput { display: none; }
</style>
</head>
<body>
<header>
  <h1>Page-by-Page Review — Pictorial Symbols Library</h1>
  <div class="toprow">
    <div class="navgroup">
      <button id="prevBtn" type="button">&larr; Prev</button>
      <input id="pageInput" type="number" min="3" max="137">
      <button id="goBtn" type="button">Go</button>
      <button id="nextBtn" type="button">Next &rarr;</button>
    </div>
    <span id="progress"></span>
    <div class="spacer"></div>
    <button id="exportBtn" type="button">&#x2B07; Export review</button>
    <button id="importBtn" type="button">&#x2B06; Import review</button>
    <input id="importInput" type="file" accept="application/json">
  </div>
  <div id="pagemap"></div>
</header>
<main>
  <div class="page-head">
    <h2 id="pageTitle"></h2>
    <span class="sub" id="pageSub"></span>
  </div>
  <div id="autohint" class="autohint" style="display:none"></div>
  <div class="statusrow">
    <button id="stGood" class="good" type="button">&#10003; Looks good</button>
    <button id="stIssues" class="issues" type="button">&#9888; Has issues</button>
    <button id="stMissing" class="missing" type="button">&#10007; Not processed</button>
  </div>
  <textarea id="notes" placeholder="Notes for this page: rejects, missing symbols, misnamed icons, anything else worth flagging…"></textarea>
  <div class="hint">Click an icon below to flag it: first click = reject, second click = misnamed, third click = clear.</div>
  <div id="grid" class="grid"></div>
  <div id="emptyState" class="empty-state" style="display:none">No icons were extracted for this page.</div>
</main>

<script>
const BOOK_MIN = 3;
const BOOK_MAX = 137;
const STORAGE_KEY = 'pictorialReview_v1';

let byPage = {};
let state = { reviews: {} };
let currentPage = 80;

function pageKey(n) { return 'SCAN' + String(n).padStart(4, '0'); }

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = JSON.parse(raw);
    if (!state.reviews) state.reviews = {};
  } catch (e) { state = { reviews: {} }; }
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function getReview(key) {
  if (!state.reviews[key]) state.reviews[key] = { status: 'unreviewed', notes: '', flags: {} };
  return state.reviews[key];
}

function parseCsv(text) {
  const lines = text.trim().split('\n');
  lines.shift();
  for (const line of lines) {
    if (!line.trim()) continue;
    const [file, name, id, page, row, col, needsName] = line.split(',');
    if (!byPage[page]) byPage[page] = [];
    byPage[page].push({ file, name, id, guess: needsName.trim() === '1' });
  }
}

function reviewedCount() {
  return Object.values(state.reviews).filter(r => r.status && r.status !== 'unreviewed').length;
}

function renderPageMap() {
  const map = document.getElementById('pagemap');
  map.innerHTML = '';
  const frag = document.createDocumentFragment();
  for (let n = BOOK_MIN; n <= BOOK_MAX; n++) {
    const key = pageKey(n);
    const review = state.reviews[key];
    const dot = document.createElement('div');
    dot.className = 'dot' + (review && review.status !== 'unreviewed' ? ' ' + review.status : '') + (n === currentPage ? ' current' : '');
    dot.textContent = n;
    dot.title = 'Page ' + n + (review && review.status !== 'unreviewed' ? ' — ' + review.status : '');
    dot.addEventListener('click', () => renderPage(n));
    frag.appendChild(dot);
  }
  map.appendChild(frag);
}

function setCardFlagClass(card, type) {
  card.classList.remove('reject', 'misnamed');
  const tag = card.querySelector('.flagtag');
  if (type === 'reject') { card.classList.add('reject'); tag.textContent = 'REJECT'; }
  else if (type === 'misnamed') { card.classList.add('misnamed'); tag.textContent = 'MISNAMED'; }
}

function renderPage(n) {
  n = Math.max(BOOK_MIN, Math.min(BOOK_MAX, n));
  currentPage = n;
  const key = pageKey(n);
  const icons = byPage[key] || [];
  const review = getReview(key);

  document.getElementById('pageInput').value = n;
  document.getElementById('pageTitle').textContent = 'Page ' + n + ' (' + key + ')';
  document.getElementById('pageSub').textContent = icons.length + ' icon' + (icons.length === 1 ? '' : 's') + ' extracted';
  document.getElementById('progress').textContent = reviewedCount() + ' / ' + (BOOK_MAX - BOOK_MIN + 1) + ' pages reviewed';

  const autohint = document.getElementById('autohint');
  if (icons.length === 0) {
    autohint.style.display = 'block';
    autohint.textContent = 'No icons were extracted for this page — it may never have been run through the crop/name pipeline.';
  } else {
    autohint.style.display = 'none';
  }

  document.getElementById('stGood').classList.toggle('active', review.status === 'good');
  document.getElementById('stIssues').classList.toggle('active', review.status === 'issues');
  document.getElementById('stMissing').classList.toggle('active', review.status === 'missing');
  document.getElementById('notes').value = review.notes || '';

  const grid = document.getElementById('grid');
  const emptyState = document.getElementById('emptyState');
  grid.innerHTML = '';
  if (icons.length === 0) {
    emptyState.style.display = 'block';
  } else {
    emptyState.style.display = 'none';
    const frag = document.createDocumentFragment();
    for (const icon of icons) {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.id = icon.id;
      card.innerHTML = '<span class="flagtag"></span>' +
        '<div class="thumb"><img src="' + icon.file + '" loading="lazy" alt="' + icon.name + '"></div>' +
        '<div class="label' + (icon.guess ? ' guess' : '') + '">' + icon.name + (icon.guess ? ' *' : '') + '</div>';
      const currentFlag = review.flags[icon.id];
      if (currentFlag) setCardFlagClass(card, currentFlag);
      card.addEventListener('click', () => {
        const cur = review.flags[icon.id];
        const next = cur === undefined ? 'reject' : cur === 'reject' ? 'misnamed' : undefined;
        if (next === undefined) delete review.flags[icon.id]; else review.flags[icon.id] = next;
        setCardFlagClass(card, next);
        saveState();
      });
      frag.appendChild(card);
    }
    grid.appendChild(frag);
  }

  renderPageMap();
}

function setStatus(status) {
  const review = getReview(pageKey(currentPage));
  review.status = review.status === status ? 'unreviewed' : status;
  saveState();
  renderPage(currentPage);
}

document.getElementById('stGood').addEventListener('click', () => setStatus('good'));
document.getElementById('stIssues').addEventListener('click', () => setStatus('issues'));
document.getElementById('stMissing').addEventListener('click', () => setStatus('missing'));

document.getElementById('notes').addEventListener('input', (e) => {
  getReview(pageKey(currentPage)).notes = e.target.value;
  saveState();
});

document.getElementById('prevBtn').addEventListener('click', () => renderPage(currentPage - 1));
document.getElementById('nextBtn').addEventListener('click', () => renderPage(currentPage + 1));
document.getElementById('goBtn').addEventListener('click', () => renderPage(parseInt(document.getElementById('pageInput').value, 10) || currentPage));
document.getElementById('pageInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') renderPage(parseInt(e.target.value, 10) || currentPage);
});

document.addEventListener('keydown', (e) => {
  const tag = document.activeElement.tagName;
  if (tag === 'TEXTAREA' || tag === 'INPUT') return;
  if (e.key === 'ArrowLeft') renderPage(currentPage - 1);
  if (e.key === 'ArrowRight') renderPage(currentPage + 1);
});

document.getElementById('exportBtn').addEventListener('click', () => {
  const payload = JSON.stringify({ exportedAt: new Date().toISOString(), reviews: state.reviews }, null, 2);
  const blob = new Blob([payload], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'pictorial-review-' + new Date().toISOString().slice(0, 10) + '.json';
  document.body.appendChild(a);
  a.click();
  a.remove();
});

document.getElementById('importBtn').addEventListener('click', () => document.getElementById('importInput').click());
document.getElementById('importInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      state.reviews = Object.assign({}, state.reviews, data.reviews || {});
      saveState();
      renderPage(currentPage);
    } catch (err) {
      alert('Could not read that file as a review export.');
    }
  };
  reader.readAsText(file);
  e.target.value = '';
});

loadState();
fetch('index.csv').then(r => r.text()).then(text => {
  parseCsv(text);
  renderPage(currentPage);
});
</script>
</body>
</html>
